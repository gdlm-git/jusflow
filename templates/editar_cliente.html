<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JusFlow - Editar Cliente</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#020617 0%,#0f172a 55%,#111827 100%);
color:#f8fafc;
min-height:100vh;
display:flex;
flex-direction:column;
}

.logo-brand{
position:absolute;
top:25px;
left:40px;
font-size:1.4rem;
font-weight:800;
color:#93c5fd;
}

.page-wrapper{
flex-grow:1;
display:flex;
align-items:center;
justify-content:center;
padding:40px 16px;
}

.form-card{
width:100%;
max-width:720px;
background:rgba(15,23,42,0.88);
border:1px solid rgba(148,163,184,0.12);
border-radius:24px;
padding:32px;
box-shadow:0 24px 50px rgba(0,0,0,0.28);
}

.badge-brand{
display:inline-block;
background:rgba(59,130,246,0.14);
color:#93c5fd;
border:1px solid rgba(59,130,246,0.28);
border-radius:999px;
padding:8px 14px;
font-size:14px;
font-weight:600;
margin-bottom:16px;
}

.page-title{
font-size:2rem;
font-weight:800;
margin-bottom:8px;
}

.page-subtitle{
color:#94a3b8;
margin-bottom:28px;
}

.form-label{
color:#cbd5e1;
font-weight:600;
margin-bottom:8px;
}

.form-control{
background:rgba(30,41,59,0.95);
border:1px solid rgba(148,163,184,0.18);
color:#f8fafc;
border-radius:14px;
padding:14px 16px;
}

.form-select{
background:rgba(30,41,59,0.95);
border:1px solid rgba(148,163,184,0.18);
color:#f8fafc;
border-radius:14px;
padding:14px 16px;
}

.form-select option{
background:#1e293b;
color:#f8fafc;
}

.btn-brand{
background:linear-gradient(135deg,#3b82f6,#2563eb);
border:none;
color:white;
font-weight:600;
border-radius:12px;
padding:12px 20px;
}

.btn-outline-soft{
background:transparent;
border:1px solid rgba(148,163,184,0.28);
color:#e2e8f0;
font-weight:600;
border-radius:12px;
padding:12px 20px;
}

footer{
text-align:center;
padding:24px;
color:#64748b;
font-size:0.9rem;
}

</style>
</head>

<body>

<div class="logo-brand">JusFlow</div>

<div class="page-wrapper">

<div class="form-card">

<span class="badge-brand">Editar Cliente</span>

<h1 class="page-title">Atualizar Cliente</h1>

<p class="page-subtitle">
Edite as informações do cliente abaixo.
</p>

<form action="/atualizar-cliente/{{ cliente[0] }}" method="POST">

<div class="mb-3">
<label class="form-label">Nome</label>
<input type="text" name="nome" class="form-control" value="{{ cliente[1] }}" required>
</div>

<div class="mb-3">
<label class="form-label">CPF</label>
<input type="text" name="cpf" class="form-control" value="{{ cliente[2] }}" required>
</div>

<div class="mb-3">
<label class="form-label">Telefone</label>
<input type="text" name="telefone" class="form-control" value="{{ cliente[3] }}" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control" value="{{ cliente[4] }}" required>
</div>

<div class="mb-4">
<label class="form-label">Tipo de Causa</label>
<select name="tipo_causa" class="form-select" required>
<option value="">Selecione uma opção</option>
<option value="Trabalhista" {% if cliente[5] == 'Trabalhista' %}selected{% endif %}>Trabalhista</option>
<option value="Cível" {% if cliente[5] == 'Cível' %}selected{% endif %}>Cível</option>
<option value="Previdenciária" {% if cliente[5] == 'Previdenciária' %}selected{% endif %}>Previdenciária</option>
<option value="Família" {% if cliente[5] == 'Família' %}selected{% endif %}>Família</option>
<option value="Consumidor" {% if cliente[5] == 'Consumidor' %}selected{% endif %}>Consumidor</option>
<option value="Criminal" {% if cliente[5] == 'Criminal' %}selected{% endif %}>Criminal</option>
<option value="Tributária" {% if cliente[5] == 'Tributária' %}selected{% endif %}>Tributária</option>
<option value="Outro" {% if cliente[5] == 'Outro' %}selected{% endif %}>Outro</option>
</select>
</div>

<div class="d-flex flex-wrap gap-2">

<button type="submit" class="btn btn-brand">
Salvar Alterações
</button>

<a href="{{ url_for('clientes') }}" class="btn btn-outline-soft">
Voltar para lista
</a>

<a href="{{ url_for('home') }}" class="btn btn-outline-soft">
Voltar para início
</a>

</div>

</form>

</div>
</div>

<footer>
© 2026 JusFlow • Projeto acadêmico — Faculdade Impacta • Desenvolvido por Gedeão Lima
</footer>

</body>
</html>
