<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JusFlow - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e3a8a 0%, #0f172a 35%, #020617 100%);
            min-height: 100vh;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        .page-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .login-card {
            width: 100%;
            max-width: 460px;
            background: rgba(15, 23, 42, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.30);
        }

        .logo-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.14);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.28);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: #94a3b8;
            margin-bottom: 28px;
        }

        .form-label {
            color: #cbd5e1;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #f8fafc;
            border-radius: 14px;
            padding: 14px 16px;
        }

        .form-control:focus {
            background: rgba(30, 41, 59, 1);
            color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.18);
        }

        .form-control::placeholder {
            color: #64748b;
        }

        .btn-brand {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px 20px;
        }

        .btn-brand:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
        }

        .helper-text {
            margin-top: 18px;
            color: #64748b;
            font-size: 0.92rem;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 24px;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="login-card">
        <span class="logo-badge">Sistema Jurídico</span>

        <h1 class="page-title">JusFlow</h1>
        <p class="page-subtitle">
            Acesse o sistema para gerenciar clientes com mais organização e praticidade.
        </p>

        <form action="/entrar" method="POST">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Digite seu email" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn btn-brand w-100">Entrar no Sistema</button>
        </form>

        <div class="helper-text">
            Login acadêmico demonstrativo
        </div>
    </div>
</div>

<footer>
    &copy; 2026 JusFlow • Projeto acadêmico — Faculdade Impacta • Desenvolvido por Gedeão Lima
</footer>

</body>
</html>
